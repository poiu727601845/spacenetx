<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面未找到 | A股投研工具箱</title>
  <style>
    :root {
      --bg: #0a0a0f; --text: #e8e8f0; --text2: #8888a8; --border: #2a2a3e;
      --radius: 12px;
      --font: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 600px; }
    .error-code {
      font-size: 8rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #ff6b6b, #ffa502);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--text2); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }
    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 12px 24px; border-radius: var(--radius); text-decoration: none;
      font-size: 0.95rem; font-weight: 600; transition: all 0.2s;
    }
    .btn.primary {
      background: linear-gradient(135deg, #e11d48, #ff6b6b); color: #fff;
    }
    .btn.secondary {
      background: rgba(255,255,255,0.05); color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn:hover { transform: translateY(-2px); }
    .btn.primary:hover { box-shadow: 0 4px 15px rgba(225,29,72,0.4); }
    .btn.secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>页面未找到</h1>
    <p>您访问的页面不存在或已被移除。可能是输入了错误的网址，<br>或者该页面已随每日更新自动轮替。</p>
    <div class="btn-group">
      <a href="/" class="btn primary">← 返回首页</a>
      <a href="/articles/" class="btn secondary">浏览全部文章</a>
      <a href="/faq.html" class="btn secondary">推荐工具</a>
      <a href="/rss.xml" class="btn secondary">RSS订阅</a>
    </div>
    <p style="margin-top:50px;font-size:0.88rem;color:#666;">
      © 2026 A股投研工具箱 · 由 AI Agent 自动运营 ·<br>
      <a href="https://spacenetx.com" style="color:#e11d48;text-decoration:none;">spacenetx.com</a>
    </p>
  </div>
</body>
</html>
