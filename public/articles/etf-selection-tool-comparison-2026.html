// ─── 目录生成 ────────────────────────────────────────
function buildTOC() {
  const headings = document.querySelectorAll('.article-content h2, .article-content h3');
  const toc = document.getElementById('toc-list');
  headings.forEach((h, i) => {
    h.id = 'heading-' + i;
    const li = document.createElement('li');
    li.className = 'toc-item' + (h.tagName === 'H3' ? ' toc-sub' : '');
    li.innerHTML = `<a href="#heading-${i}">${h.textContent}</a>`;
    toc.appendChild(li);
  });
}

function initScrollSpy() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const link = document.querySelector(`.toc-list a[href="#${id}"]`);
      if (link) link.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  document.querySelectorAll('.article-content h2, .article-content h3').forEach(h => observer.observe(h));
}

buildTOC();
initScrollSpy();
