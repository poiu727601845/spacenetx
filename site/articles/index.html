<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="A股投研工具箱 - 全部文章列表"/>
<title>全部文章 | A股投研工具箱</title>
<style>
:root{--primary:#e11d48;--accent:#f59e0b;--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--border:#2a2a3e;--text:#e8e8f0;--text2:#8888a8;--text3:#555568;--radius:14px;--font:'PingFang SC','Microsoft YaHei',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6}
nav{background:rgba(10,10,15,0.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1000px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.15rem;font-weight:800;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:8px;transition:all 0.2s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--bg3)}
.page-header{max-width:1000px;margin:0 auto;padding:50px 24px 30px;text-align:center}
.page-header h1{font-size:2rem;font-weight:900;margin-bottom:12px}
.page-header p{color:var(--text2);font-size:1rem}
.articles-list{max-width:1000px;margin:0 auto;padding:0 24px 60px;display:grid;gap:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;text-decoration:none;display:flex;gap:16px;transition:all 0.25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--primary),var(--accent));opacity:0;transition:opacity 0.25s}
.card:hover{border-color:rgba(225,29,72,0.4);background:var(--bg3);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card:hover::before{opacity:1}
.card-body{flex:1}
.card-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.tag{font-size:0.72rem;font-weight:600;padding:3px 9px;border-radius:5px}
.tag.etf{color:#fca5a5;background:rgba(225,29,72,0.1);border:1px solid rgba(225,29,72,0.25)}
.tag.sector{color:#6ee7b7;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25)}
.tag.ai{color:#a5b4fc;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25)}
.tag.flow{color:#fde68a;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25)}
.tag.strategy{color:#f9a8d4;background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.25)}
.tag.broad{color:#7dd3fc;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25)}
.tag.default{color:#bbb;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15)}
.card-date{font-size:0.78rem;color:var(--text3)}
.card-title{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.45}
.card:hover .card-title{color:#ff8a9e}
.card-desc{font-size:0.85rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{margin-top:10px;display:flex;align-items:center;gap:14px;font-size:0.78rem;color:var(--text3)}
.card-arrow{margin-left:auto;color:var(--text3);transition:all 0.2s}
.card:hover .card-arrow{color:var(--primary);transform:translateX(4px)}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:30px 24px;text-align:center}
.footer p{color:var(--text3);font-size:0.85rem}
.footer a{color:var(--primary);text-decoration:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:0.9rem;padding:10px 18px;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;margin-bottom:24px}
.back-btn:hover{color:var(--text);border-color:var(--primary);background:var(--bg3)}
@media(max-width:768px){.card{flex-direction:column}.page-header h1{font-size:1.5rem}}
</style>
</head>
<body>
<nav>
<div class="nav-inner">
<a href="/" class="logo"><div class="logo-icon">AI</div>A股投研工具箱</a>
<ul class="nav-links">
<li><a href="/">首页</a></li>
<li><a href="/articles/" class="active">全部文章</a></li>
</ul>
</div>
</nav>
<div class="page-header">
<a href="/" class="back-btn">← 返回首页</a>
<h1>全部文章</h1>
<p>由 AI 自动运行，每日更新最新文章紧跟市场趋势</p>
</div>
<div class="articles-list" id="article-list">
<div style="text-align:center;padding:60px 20px;color:var(--text3)"><div class="spinner"></div>正在加载文章列表...</div>
</div>
<footer class="footer">
<p>© 2026 <a href="https://spacenetx.com">A股投研工具箱 · spacenetx.com</a> · 由 AI Agent 自动运营</p>
</footer>
<script>
var tagMap={'ETF评测':'etf','中证A500':'broad','半导体':'sector','电网设备':'sector','AI主题':'ai','资金流向':'flow','板块轮动':'strategy','宽基指数':'broad'};
function getTagClass(t){for(var k in tagMap)if(t.indexOf(k)!==-1)return tagMap[k];return 'default'}
fetch('/data/articles.json').then(function(r){return r.json()}).then(function(data){
if(!Array.isArray(data))return;
var el=document.getElementById('article-list');
el.innerHTML=data.map(function(a){
var tagsHtml=(a.tags||[]).map(function(t){return '<span class="tag '+getTagClass(t)+'">'+t+'</span>'}).join('');
return '<a href="'+a.url+'" class="card"><div class="card-body"><div class="card-meta">'+tagsHtml+'<span class="card-date">'+a.date+'</span></div><div class="card-title">'+a.title+'</div><div class="card-desc">'+(a.desc||'暂无摘要')+'</div><div class="card-footer"><span>'+a.readTime+'</span></div></div><div class="card-arrow">→</div></a>';
}).join('');
}).catch(function(e){console.error(e);document.getElementById('article-list').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text3)">加载失败</div>'});
</script>
</body>
</html>
